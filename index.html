<!DOCTYPE html>
<html>
<head>
<title>Q3 Seatwork 2</title>


<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">




<style>
body{
    background-color:#fffff3;
    color:rgb(67, 67, 67);
    text-align:center;
}
.box{
    background-color:rgba(175, 255, 206, 0.562);
    padding:20px;
    margin-top:40px;
    border-radius:10px;
}
button{
    margin:5px;
}
.store{
    background-color:rgba(241, 176, 212, 0.907);
    margin-top:20px;
    padding:15px;
    border-radius:10px;
}
</style>
</head>


<body>


<nav class="navbar navbar-dark bg-primary">
<div class="container-fluid">
<span class="navbar-brand">Product Locator</span>
</div>
</nav>


<div class="container">


<div class="box">
<h3>Want a gaming laptop?</h3>
<p>Enter your budget</p>


<input id="budget" class="form-control" placeholder="Enter here">
<br>
<button class="btn btn-dark" onclick="compute()">Check</button>


<p>You are eligible for: ₱ <span id="answer">0.00</span></p>
</div>


<h4 class="mt-3">Recommended Brands</h4>
<button class="btn btn-dark">Acer</button>
<button class="btn btn-dark">Asus</button>
<button class="btn btn-dark">Lenovo</button>


<div class="store">
<h5>VillMan Computers</h5>
<p>SM Fairview</p>


<hr>


<h5>Silicon Valley</h5>
<p>SM North EDSA</p>
</div>


</div>


<script>
function compute(){
let b = Number(document.getElementById("budget").value);


let result = b * 0.1;


document.getElementById("answer").innerText = result.toFixed(2);
}
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>;
</body>
</html>
